name: Run Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build UI assets
        run: bun run ui:build

      - name: Run Bun migration tests
        run: bun test tests/bun-migration.bun.test.js tests/batch-runner.bun.test.js tests/file-io-sqlite.bun.test.js

      - name: Run compiled binary smoke test
        run: bun test tests/compiled-binary.bun.test.js
        timeout-minutes: 5

      - name: Run vitest suite
        run: bun run test
